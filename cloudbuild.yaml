# Cloud Build configuration for HustStay Backend
# This file configures automatic builds when pushing to GitHub

substitutions:
  _REGION: asia-southeast1
  _REPO: huststay-repo

steps:
  # ========== BUILD ALL SERVICES ==========
  
  # Build User Service
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/user-service:$SHORT_SHA', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/user-service:latest', './user-service']
    id: 'build-user-service'
    waitFor: ['-']

  # Build Hotel Service
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/hotel-service:$SHORT_SHA', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/hotel-service:latest', './hotel-service']
    id: 'build-hotel-service'
    waitFor: ['-']

  # Build Room Service
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/room-service:$SHORT_SHA', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/room-service:latest', './room-service']
    id: 'build-room-service'
    waitFor: ['-']

  # Build Booking Service
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/booking-service:$SHORT_SHA', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/booking-service:latest', './booking-service']
    id: 'build-booking-service'
    waitFor: ['-']

  # Build Payment Service
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/payment-service:$SHORT_SHA', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/payment-service:latest', './payment-service']
    id: 'build-payment-service'
    waitFor: ['-']

  # Build Review Service
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/review-service:$SHORT_SHA', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/review-service:latest', './review-service']
    id: 'build-review-service'
    waitFor: ['-']

  # Build Chat Service
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/chat-service:$SHORT_SHA', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/chat-service:latest', './chat-service']
    id: 'build-chat-service'
    waitFor: ['-']

  # Build API Gateway (last - after all services)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api-gateway:$SHORT_SHA', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api-gateway:latest', './api-gateway']
    id: 'build-api-gateway'
    waitFor: ['build-user-service', 'build-hotel-service', 'build-room-service', 'build-booking-service', 'build-payment-service', 'build-review-service', 'build-chat-service']

  # ========== PUSH ALL IMAGES ==========
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api-gateway']
    id: 'push-api-gateway'
    waitFor: ['build-api-gateway']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/user-service']
    id: 'push-user-service'
    waitFor: ['build-user-service']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/hotel-service']
    id: 'push-hotel-service'
    waitFor: ['build-hotel-service']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/room-service']
    id: 'push-room-service'
    waitFor: ['build-room-service']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/booking-service']
    id: 'push-booking-service'
    waitFor: ['build-booking-service']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/payment-service']
    id: 'push-payment-service'
    waitFor: ['build-payment-service']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/review-service']
    id: 'push-review-service'
    waitFor: ['build-review-service']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/chat-service']
    id: 'push-chat-service'
    waitFor: ['build-chat-service']

  # ========== DEPLOY TO CLOUD RUN ==========

  # Deploy User Service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
    - 'run'
    - 'deploy'
    - 'user-service'
    - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/user-service:$SHORT_SHA'
    - '--region=${_REGION}'
    - '--platform=managed'
    - '--port=8080'
    - '--memory=512Mi'
    - '--set-env-vars=SERVER_PORT=8080,EUREKA_CLIENT_ENABLED=false,DB_URL=jdbc:postgresql://14.162.146.23:5432/user_service,DB_USERNAME=root'
    - '--set-secrets=DB_PASSWORD=db-password:latest'
    - '--set-secrets=JWT_SECRET=jwt-secret:latest'
    - '--allow-unauthenticated'
    id: 'deploy-user-service'
    waitFor: ['push-user-service']

  # Deploy Hotel Service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
    - 'run'
    - 'deploy'
    - 'hotel-service'
    - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/hotel-service:$SHORT_SHA'
    - '--region=${_REGION}'
    - '--platform=managed'
    - '--port=8080'
    - '--memory=512Mi'
    - '--set-env-vars=SERVER_PORT=8080,EUREKA_CLIENT_ENABLED=false,DB_URL=jdbc:postgresql://14.162.146.23:5432/hotel_service,DB_USERNAME=root'
    - '--set-secrets=DB_PASSWORD=db-password:latest'
    - '--allow-unauthenticated'
    id: 'deploy-hotel-service'
    waitFor: ['push-hotel-service']

  # Deploy Room Service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
    - 'run'
    - 'deploy'
    - 'room-service'
    - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/room-service:$SHORT_SHA'
    - '--region=${_REGION}'
    - '--platform=managed'
    - '--port=8080'
    - '--memory=512Mi'
    - '--set-env-vars=SERVER_PORT=8080,EUREKA_CLIENT_ENABLED=false,DB_URL=jdbc:postgresql://14.162.146.23:5432/room_service,DB_USERNAME=root'
    - '--set-secrets=DB_PASSWORD=db-password:latest'
    - '--allow-unauthenticated'
    id: 'deploy-room-service'
    waitFor: ['push-room-service']

  # Deploy Booking Service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
    - 'run'
    - 'deploy'
    - 'booking-service'
    - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/booking-service:$SHORT_SHA'
    - '--region=${_REGION}'
    - '--platform=managed'
    - '--port=8080'
    - '--memory=512Mi'
    - '--set-env-vars=SERVER_PORT=8080,EUREKA_CLIENT_ENABLED=false,DB_URL=jdbc:postgresql://14.162.146.23:5432/booking_service,DB_USERNAME=root'
    - '--set-secrets=DB_PASSWORD=db-password:latest'
    - '--set-secrets=GOOGLE_CLIENT_ID=google-client-id:latest'
    - '--set-secrets=GOOGLE_CLIENT_SECRET=google-client-secret:latest'
    - '--allow-unauthenticated'
    id: 'deploy-booking-service'
    waitFor: ['push-booking-service']

  # Deploy Payment Service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
    - 'run'
    - 'deploy'
    - 'payment-service'
    - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/payment-service:$SHORT_SHA'
    - '--region=${_REGION}'
    - '--platform=managed'
    - '--port=8080'
    - '--memory=512Mi'
    - '--set-env-vars=SERVER_PORT=8080,EUREKA_CLIENT_ENABLED=false,DB_URL=jdbc:postgresql://14.162.146.23:5432/payment_service,DB_USERNAME=root'
    - '--set-secrets=DB_PASSWORD=db-password:latest'
    - '--set-secrets=STRIPE_PUBLISHABLE_KEY=stripe-publishable-key:latest'
    - '--set-secrets=STRIPE_SECRET_KEY=stripe-secret-key:latest'
    - '--allow-unauthenticated'
    id: 'deploy-payment-service'
    waitFor: ['push-payment-service']

  # Deploy Review Service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
    - 'run'
    - 'deploy'
    - 'review-service'
    - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/review-service:$SHORT_SHA'
    - '--region=${_REGION}'
    - '--platform=managed'
    - '--port=8080'
    - '--memory=512Mi'
    - '--set-env-vars=SERVER_PORT=8080,EUREKA_CLIENT_ENABLED=false,DB_URL=jdbc:postgresql://14.162.146.23:5432/review_service,DB_USERNAME=root'
    - '--set-secrets=DB_PASSWORD=db-password:latest'
    - '--allow-unauthenticated'
    id: 'deploy-review-service'
    waitFor: ['push-review-service']

  # Deploy Chat Service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
    - 'run'
    - 'deploy'
    - 'chat-service'
    - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/chat-service:$SHORT_SHA'
    - '--region=${_REGION}'
    - '--platform=managed'
    - '--port=8080'
    - '--memory=512Mi'
    - '--set-env-vars=SERVER_PORT=8080,EUREKA_CLIENT_ENABLED=false,DB_URL=jdbc:postgresql://14.162.146.23:5432/chat_service,DB_USERNAME=root'
    - '--set-secrets=DB_PASSWORD=db-password:latest'
    - '--allow-unauthenticated'
    id: 'deploy-chat-service'
    waitFor: ['push-chat-service']

  # Deploy API Gateway (last - depends on all services)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
    - 'run'
    - 'deploy'
    - 'api-gateway'
    - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api-gateway:$SHORT_SHA'
    - '--region=${_REGION}'
    - '--platform=managed'
    - '--port=8080'
    - '--memory=512Mi'
    - '--set-env-vars=SERVER_PORT=8080,EUREKA_CLIENT_ENABLED=false'
    - '--set-secrets=JWT_SECRET=jwt-secret:latest'
    - '--allow-unauthenticated'
    id: 'deploy-api-gateway'
    waitFor: ['push-api-gateway', 'deploy-user-service', 'deploy-hotel-service', 'deploy-room-service']

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api-gateway:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/user-service:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/hotel-service:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/room-service:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/booking-service:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/payment-service:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/review-service:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/chat-service:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '3600s'
